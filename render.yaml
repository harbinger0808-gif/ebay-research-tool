services:
  - type: web
    name: harbinger-ebay-research
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: EBAY_DEV_ID
        sync: false
      - key: EBAY_USER_TOKEN
        sync: false
      - key: EBAY_READ_ONLY
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
